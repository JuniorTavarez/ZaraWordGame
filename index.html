<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spelling Adventure Hub!</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center; background-color: #f3e5f5; margin: 0; padding: 15px;
    }
    .app-container {
      background-color: white; max-width: 650px; margin: 10px auto; padding: 25px;
      border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 5px solid #ab47bc;
    }
    h1 { color: #6a1b9a; font-size: 32px; margin-bottom: 5px; }
    p.subtitle { color: #757575; font-size: 16px; margin-bottom: 25px; }
    
    /* Menu Styles */
    .menu-btn {
      display: block; width: 90%; margin: 12px auto; padding: 18px;
      font-size: 20px; font-weight: bold; color: white; border: none;
      border-radius: 15px; cursor: pointer; transition: 0.2s;
    }
    .btn-learn { background-color: #8bc34a; box-shadow: 0 6px 0 #558b2f; }
    .btn-vowels { background-color: #ff9800; box-shadow: 0 6px 0 #e65100; }
    .btn-mystery { background-color: #ec407a; box-shadow: 0 6px 0 #c2185b; }
    .btn-scramble { background-color: #29b6f6; box-shadow: 0 6px 0 #0288d1; }
    .btn-match { background-color: #9c27b0; box-shadow: 0 6px 0 #7b1fa2; }
    .menu-btn:active { transform: translateY(6px); box-shadow: none; }

    /* Game UI Shared */
    .hidden { display: none !important; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #555; margin-bottom: 15px; font-size: 18px;}
    .progress-text { color: #8e24aa; }
    
    .audio-controls { display: flex; gap: 8px; }
    .hear-btn { background-color: #ffca28; border: none; padding: 10px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 3px 0 #ffb300;}
    .hear-sentence-btn { background-color: #4dd0e1; border: none; padding: 10px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; box-shadow: 0 3px 0 #00acc1;}
    .hear-btn:active, .hear-sentence-btn:active { transform: translateY(3px); box-shadow: none; }
    
    /* Timer Style */
    .timer-display { color: #e53935; font-size: 20px; background: #ffebee; padding: 5px 12px; border-radius: 10px; border: 2px solid #ef9a9a;}

    /* QWERTY Keyboard Styles */
    .keyboard { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 15px; }
    .key-row { display: flex; justify-content: center; gap: 4px; width: 100%;}
    .key-btn { 
      padding: 12px 10px; font-size: 20px; font-weight: bold; border-radius: 8px;
      border: 2px solid #ccc; background: white; cursor: pointer; transition: 0.1s;
      min-width: 35px; flex-grow: 1; max-width: 45px;
    }
    .key-btn:active { background: #eee; transform: translateY(2px); }
    .key-btn:disabled { background: #e0e0e0; color: #999; border-color: #eee; cursor: not-allowed; }
    
    /* Drag & Drop Specific Styles */
    .key-btn.selected { background-color: #ffca28; border-color: #ffb300; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .drop-container { display: flex; justify-content: center; gap: 8px; margin: 25px 0; flex-wrap: wrap; }
    .drop-box { 
      width: 40px; height: 50px; border-bottom: 5px solid #ccc; 
      font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; 
      text-transform: uppercase; cursor: pointer; transition: 0.2s;
    }
    .drop-box.active-target { background-color: #fffde7; border-bottom-color: #ffca28; }
    .drop-box.filled { border-bottom-color: #4caf50; color: #4caf50; cursor: default; }

    /* Match Game Specific Styles */
    .definition-prompt { font-size: 22px; color: #1565c0; font-weight: bold; margin-bottom: 20px; padding: 15px; background: #e3f2fd; border-radius: 15px; border: 2px dashed #90caf9;}
    .match-btn { display: block; font-size: 20px; padding: 12px; margin: 10px auto; border-radius: 12px; border: 3px solid #ccc; cursor: pointer; background: white; width: 90%; transition: 0.2s; font-weight: bold; letter-spacing: 1px;}
    .match-btn:active { transform: translateY(3px); }
    .match-btn:disabled { cursor: not-allowed; }
    .match-btn.correct { background-color: #8bc34a; color: white; border-color: #558b2f; }
    .match-btn.wrong { background-color: #e57373; color: white; border-color: #d32f2f; text-decoration: line-through; }

    /* Utility Keys */
    .util-keys { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
    .util-btn { padding: 10px 18px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; color: white;}
    .backspace-btn { background-color: #9e9e9e; box-shadow: 0 4px 0 #757575; }
    .submit-btn { background-color: #66bb6a; box-shadow: 0 4px 0 #388e3c; }
    .util-btn:active { transform: translateY(4px); box-shadow: none; }

    /* Display Areas */
    .word-display { font-size: 32px; letter-spacing: 6px; margin: 15px 0; font-family: monospace; font-weight: bold; min-height: 45px;}
    .learn-prompt { font-size: 38px; letter-spacing: 6px; color: #8bc34a; font-weight: bold; margin-bottom: 10px; font-family: monospace;}
    .scramble-prompt { font-size: 30px; letter-spacing: 4px; color: #ff9800; font-weight: bold; margin-bottom: 10px;}
    .vowel-prompt { font-size: 20px; color: #e65100; font-weight: bold; margin-bottom: 10px;}
    #livesDisplay { font-size: 24px; margin-bottom: 10px; }
    .feedback { font-size: 20px; font-weight: bold; height: 30px; margin-top: 10px; }

    /* Report */
    #practiceReport { background-color: #fff3e0; border: 3px dashed #ffb300; border-radius: 15px; padding: 20px; margin-top: 25px; }
    .home-btn { background-color: #9e9e9e; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 18px;}
    .score-headline { font-size: 26px; margin: 10px 0; color: #333; }
    #motivationalQuote { font-size: 18px; color: #1565c0; font-style: italic; font-weight: bold; margin: 15px 0; }

    /* ========================================= */
    /* MOBILE FIXES (For iPhone 14 / Narrow screens) */
    /* ========================================= */
    @media (max-width: 450px) {
      .app-container { padding: 15px; border-width: 3px; }
      h1 { font-size: 26px; }
      .status-bar { flex-direction: column; gap: 10px; font-size: 16px; }
      
      /* Keyboard Fix - Shorter padding/widths so all 10 keys fit! */
      .key-btn { padding: 10px 4px; font-size: 18px; min-width: 28px; }
      .key-row { gap: 3px; }
      
      /* Display Text Fixes */
      .word-display { font-size: 28px; letter-spacing: 4px; }
      .learn-prompt { font-size: 32px; letter-spacing: 4px; }
      .scramble-prompt { font-size: 26px; letter-spacing: 3px; }
      
      /* Drop Zones - Allows long words to wrap to the next line safely */
      .drop-box { width: 32px; height: 42px; font-size: 26px; border-bottom-width: 4px; }
      .drop-container { gap: 5px; }

      /* Match Game Fix */
      .definition-prompt { font-size: 18px; padding: 12px; }
      .match-btn { font-size: 16px; width: 100%; padding: 12px 5px;}
    }
  </style>
</head>
<body>

  <audio id="failSound" src="https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3" preload="auto"></audio>
  <audio id="yaySound" src="https://www.myinstants.com/media/sounds/kids_cheering.mp3" preload="auto"></audio>

  <div class="app-container">
    
    <div id="mainMenu">
      <h1>✨ Spelling Hub ✨</h1>
      <p class="subtitle">Choose your challenge for today!</p>
      <button class="menu-btn btn-match" onclick="startGame('match')">🧩 Vocab Matcher</button>
      <button class="menu-btn btn-learn" onclick="startGame('learn')">📖 Read & Copy</button>
      <button class="menu-btn btn-vowels" onclick="startGame('vowels')">🕳️ The Vowel Void</button>
      <button class="menu-btn btn-mystery" onclick="startGame('mystery')">🕵️‍♀️ Mystery Word</button>
      <button class="menu-btn btn-scramble" onclick="startGame('scramble')">⌨️ Speed Scramble</button>
    </div>

    <div id="gameMatch" class="hidden">
      <div class="status-bar">
        <span class="progress-text">Word: <span id="matchProgress"></span></span>
        <div class="audio-controls">
          <button class="hear-btn" onclick="speakDefinition()">🔊 Read Definition</button>
        </div>
      </div>
      <div id="definitionPrompt" class="definition-prompt"></div>
      <div id="matchChoices"></div>
      <div id="matchFeedback" class="feedback"></div>
    </div>

    <div id="gameLearn" class="hidden">
      <div class="status-bar">
        <span class="progress-text">Word: <span id="lProgress"></span></span>
        <div class="audio-controls">
          <button class="hear-btn" onclick="speakWord()">🔊 Word</button>
          <button class="hear-sentence-btn" onclick="speakSentence()">🗣️ Sentence</button>
        </div>
      </div>
      <div style="font-size: 16px; color: #757575; font-weight: bold; margin-bottom: 10px;">Look at the word and type it below!</div>
      <div id="learnPromptDisplay" class="learn-prompt"></div>
      <div id="learnGuessDisplay" class="word-display" style="color: #333; border-bottom: 3px dashed #ccc; padding-bottom: 5px;"></div>
      <div class="keyboard" id="lKeyboardArea"></div>
      <div class="util-keys">
        <button class="util-btn backspace-btn" onclick="handleBackspace('learn')">⬅️ Undo</button>
        <button class="util-btn submit-btn" onclick="checkLearn()">Check It!</button>
      </div>
      <div id="lFeedback" class="feedback"></div>
    </div>

    <div id="gameMystery" class="hidden">
      <div class="status-bar">
        <span class="progress-text">Word: <span id="mProgress"></span></span>
        <div class="audio-controls">
          <button class="hear-btn" onclick="speakWord()">🔊 Word</button>
          <button class="hear-sentence-btn" onclick="speakSentence()">🗣️ Sentence</button>
        </div>
      </div>
      <div id="livesDisplay">❤️❤️</div>
      <div id="dropZoneContainer" class="drop-container"></div>
      <div id="mFeedback" class="feedback"></div>
      <div class="keyboard" id="mKeyboardArea"></div>
    </div>

    <div id="gameScramble" class="hidden">
      <div class="status-bar">
        <span class="progress-text">Word: <span id="sProgress"></span></span>
        <span id="sTimerDisplay" class="timer-display">⏳ 30</span>
        <div class="audio-controls">
          <button class="hear-btn" onclick="speakWord()">🔊 Word</button>
          <button class="hear-sentence-btn" onclick="speakSentence()">🗣️ Sentence</button>
        </div>
      </div>
      <div id="scrambledPrompt" class="scramble-prompt"></div>
      <div id="scrambleGuessDisplay" class="word-display" style="color: #29b6f6; border-bottom: 3px dashed #ccc; padding-bottom: 5px;"></div>
      <div class="keyboard" id="sKeyboardArea"></div>
      <div class="util-keys">
        <button class="util-btn backspace-btn" onclick="handleBackspace('scramble')">⬅️ Undo</button>
        <button class="util-btn submit-btn" onclick="checkScramble()">Check It!</button>
      </div>
      <div id="sFeedback" class="feedback"></div>
    </div>

    <div id="gameVowels" class="hidden">
      <div class="status-bar">
        <span class="progress-text">Word: <span id="vProgress"></span></span>
        <div class="audio-controls">
          <button class="hear-btn" onclick="speakWord()">🔊 Word</button>
          <button class="hear-sentence-btn" onclick="speakSentence()">🗣️ Sentence</button>
        </div>
      </div>
      <div class="vowel-prompt">Fill in the missing vowels!</div>
      <div id="vowelWordDisplay" class="word-display" style="color: #ff9800;"></div>
      <div class="keyboard" id="vKeyboardArea"></div>
      <div class="util-keys">
        <button class="util-btn backspace-btn" onclick="handleBackspace('vowels')">⬅️ Undo</button>
        <button class="util-btn submit-btn" onclick="checkVowels()">Check It!</button>
      </div>
      <div id="vFeedback" class="feedback"></div>
    </div>

    <div id="practiceReport" class="hidden">
      <h1 style="color: #e65100;">Test Complete! 🏆</h1>
      <h2 class="score-headline">Score: <span id="scorePercentDisplay"></span>% (<span id="passFailDisplay"></span>)</h2>
      
      <p id="motivationalQuote" class="hidden"></p>

      <h3>🎯 Needs Practice:</h3>
      <p id="missedWordsList" style="font-size: 20px; font-weight: bold;"></p>
      <button class="home-btn" onclick="location.reload()">🏠 Back to Menu</button>
    </div>

  </div>

  <script>
    // --- LIST 1: YOUR SPELLING WORDS WITH SENTENCES ---
    const originalWordList = [
      { word: "dare", sentence: "I dare you to jump over the puddle." },
      { word: "stare", sentence: "It is not polite to stare at people." },
      { word: "fare", sentence: "We paid the bus fare to ride downtown." },
      { word: "hair", sentence: "She brushed her long brown hair." },
      { word: "pair", sentence: "I bought a new pair of shoes." },
      { word: "chair", sentence: "Please pull up a chair and sit down." },
      { word: "bear", sentence: "The brown bear slept in the cave." },
      { word: "pear", sentence: "I ate a sweet, juicy green pear." },
      { word: "where", sentence: "Do you know where my keys are?" },
      { word: "there", sentence: "Look over there at the beautiful sunset." },
      { word: "dear", sentence: "My dear friend sent me a birthday card." },
      { word: "cheers", sentence: "The crowd gave three loud cheers for the team." },
      { word: "knew", sentence: "She knew the answer to the math problem." },
      { word: "never", sentence: "I have never been to the moon." },
      { word: "talk", sentence: "We love to talk on the phone." }
    ];

    // --- LIST 2: YOUR VOCABULARY WORDS WITH DEFINITIONS ---
    const vocabList = [
      { word: "drops", definition: "small amounts of liquid that fall in a round shape" },
      { word: "excite", definition: "things that make a person feel happy or eager" },
      { word: "outdoors", definition: "something that is outside a building" },
      { word: "pale", definition: "something that is a very light color" }
    ];
    
    // Global State
    let currentWords = [];
    let currentWordIndex = 0;
    let correctWord = "";
    let correctSentence = "";
    let missedWords = new Set();
    let currentGameType = "";
    let isVocabMode = false;

    // QWERTY Layout
    const qwertyLayout = [
      ["q","w","e","r","t","y","u","i","o","p"],
      ["a","s","d","f","g","h","j","k","l"],
      ["z","x","c","v","b","n","m"]
    ];

    function speakWord() {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(correctWord));
    }

    function speakSentence() {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(correctSentence));
    }

    function speakDefinition() {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(correctSentence));
    }

    function updateProgressUI() {
      const progressText = `${currentWordIndex + 1} of ${currentWords.length}`;
      document.getElementById('matchProgress').innerText = progressText;
      document.getElementById('lProgress').innerText = progressText;
      document.getElementById('mProgress').innerText = progressText;
      document.getElementById('sProgress').innerText = progressText;
      document.getElementById('vProgress').innerText = progressText;
    }

    function startGame(type) {
      currentGameType = type;
      isVocabMode = (type === 'match');
      
      let listToUse = isVocabMode ? vocabList : originalWordList;
      currentWords = [...listToUse].sort(() => Math.random() - 0.5);
      
      currentWordIndex = 0;
      missedWords.clear();

      document.getElementById('mainMenu').classList.add('hidden');
      
      if (type === 'match') {
        document.getElementById('gameMatch').classList.remove('hidden');
        loadMatchWord();
      } else if (type === 'learn') {
        document.getElementById('gameLearn').classList.remove('hidden');
        loadLearnWord();
      } else if (type === 'mystery') {
        document.getElementById('gameMystery').classList.remove('hidden');
        loadMysteryWord();
      } else if (type === 'scramble') {
        document.getElementById('gameScramble').classList.remove('hidden');
        loadScrambleWord();
      } else if (type === 'vowels') {
        document.getElementById('gameVowels').classList.remove('hidden');
        loadVowelWord();
      }
    }

    function playBuzzer() {
      try { 
        document.getElementById("failSound").currentTime = 0;
        document.getElementById("failSound").play(); 
      } catch(e) {}
    }

    function handleMissedWord(pushToBack) {
      if (!missedWords.has(correctWord)) {
        missedWords.add(correctWord);
      }
      if (pushToBack) {
        let activeList = isVocabMode ? vocabList : originalWordList;
        let wordObj = activeList.find(w => w.word.toLowerCase() === correctWord);
        currentWords.push(wordObj);
        updateProgressUI(); 
      }
    }

    function disableKeyboard(containerId) {
      let keys = document.getElementById(containerId).getElementsByClassName('key-btn');
      for(let key of keys) key.disabled = true;
    }

    function buildBasicKeyboard(containerId, clickHandler) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      qwertyLayout.forEach(row => {
        let rowDiv = document.createElement("div");
        rowDiv.className = "key-row";
        row.forEach(letter => {
          let btn = document.createElement("button");
          btn.innerText = letter.toUpperCase();
          btn.className = "key-btn";
          btn.onclick = () => clickHandler(letter, btn);
          rowDiv.appendChild(btn);
        });
        container.appendChild(rowDiv);
      });
    }

    // ==========================================
    // GAME 5: VOCAB MATCHER 
    // ==========================================
    function loadMatchWord() {
      if (currentWordIndex >= currentWords.length) return endGame();

      let currentItem = currentWords[currentWordIndex];
      correctWord = currentItem.word.toLowerCase();
      correctSentence = currentItem.definition; 

      updateProgressUI();
      document.getElementById('matchFeedback').innerText = "";
      document.getElementById('definitionPrompt').innerText = correctSentence;

      const choicesContainer = document.getElementById('matchChoices');
      choicesContainer.innerHTML = "";

      let shuffledVocab = [...vocabList].sort(() => Math.random() - 0.5);

      shuffledVocab.forEach(v => {
        let btn = document.createElement("button");
        btn.className = "match-btn";
        btn.innerText = v.word.toUpperCase();
        btn.onclick = () => checkMatch(v.word.toLowerCase(), btn);
        choicesContainer.appendChild(btn);
      });
    }

    function checkMatch(guessedWord, btn) {
      let feedback = document.getElementById('matchFeedback');
      
      if (guessedWord === correctWord) {
        btn.classList.add('correct');
        feedback.innerText = "🎉 PERFECT! 🎉";
        feedback.style.color = "green";
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Great job!"));
        
        let buttons = document.getElementsByClassName('match-btn');
        for(let b of buttons) b.disabled = true;

        setTimeout(() => { currentWordIndex++; loadMatchWord(); }, 1500);
      } else {
        btn.classList.add('wrong');
        btn.disabled = true;
        playBuzzer();
        feedback.innerText = "Not quite! Try another one.";
        feedback.style.color = "red";
        handleMissedWord(true); 
      }
    }

    // ==========================================
    // GAME 4: READ & COPY 
    // ==========================================
    let learnGuess = "";

    function loadLearnWord() {
      if (currentWordIndex >= currentWords.length) return endGame();
      
      correctWord = currentWords[currentWordIndex].word.toLowerCase();
      correctSentence = currentWords[currentWordIndex].sentence;
      learnGuess = "";
      updateProgressUI();
      document.getElementById('lFeedback').innerText = "";
      document.getElementById('learnGuessDisplay').innerText = "";

      document.getElementById('learnPromptDisplay').innerText = correctWord.toUpperCase();
      
      buildBasicKeyboard('lKeyboardArea', (letter) => {
        if(learnGuess.length < correctWord.length) {
          learnGuess += letter;
          document.getElementById('learnGuessDisplay').innerText = learnGuess.toUpperCase();
        }
      });
    }

    function checkLearn() {
      if (learnGuess.length === 0) return;
      let feedback = document.getElementById('lFeedback');

      if (learnGuess === correctWord) {
        feedback.innerText = "🎉 PERFECT! 🎉";
        feedback.style.color = "green";
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Good job!"));
        disableKeyboard('lKeyboardArea');
        setTimeout(() => { currentWordIndex++; loadLearnWord(); }, 1500);
      } else {
        feedback.innerText = "Check your spelling!";
        feedback.style.color = "red";
        playBuzzer();
        learnGuess = ""; 
        document.getElementById('learnGuessDisplay').innerText = "";
        
        if (!missedWords.has(correctWord)) { missedWords.add(correctWord); }
      }
    }

    // ==========================================
    // GAME 1: MYSTERY WORD 
    // ==========================================
    let mysteryFilled = [];
    let lives = 2; 
    let currentlySelectedLetter = null;

    function loadMysteryWord() {
      if (currentWordIndex >= currentWords.length) return endGame();
      
      correctWord = currentWords[currentWordIndex].word.toLowerCase();
      correctSentence = currentWords[currentWordIndex].sentence;
      mysteryFilled = new Array(correctWord.length).fill(false);
      lives = 2;
      currentlySelectedLetter = null;
      updateProgressUI();
      document.getElementById('mFeedback').innerText = "";
      
      buildMysteryKeyboard();
      updateMysteryDropZones();
    }

    function buildMysteryKeyboard() {
      const container = document.getElementById('mKeyboardArea');
      container.innerHTML = "";
      
      qwertyLayout.forEach(row => {
        let rowDiv = document.createElement("div");
        rowDiv.className = "key-row";
        row.forEach(letter => {
          let btn = document.createElement("button");
          btn.innerText = letter.toUpperCase();
          btn.className = "key-btn";
          
          btn.draggable = true;
          btn.ondragstart = (e) => {
            e.dataTransfer.setData("letter", letter);
            currentlySelectedLetter = null; 
            clearKeyboardSelection();
          };

          btn.onclick = () => {
            clearKeyboardSelection();
            currentlySelectedLetter = letter;
            btn.classList.add('selected');
          };

          rowDiv.appendChild(btn);
        });
        container.appendChild(rowDiv);
      });
    }

    function clearKeyboardSelection() {
      document.querySelectorAll('#mKeyboardArea .key-btn').forEach(b => b.classList.remove('selected'));
    }

    function updateMysteryDropZones() {
      let container = document.getElementById('dropZoneContainer');
      container.innerHTML = "";
      
      for (let i = 0; i < correctWord.length; i++) {
        let box = document.createElement('div');
        box.className = 'drop-box';
        
        if (mysteryFilled[i]) {
          box.innerText = correctWord[i];
          box.classList.add('filled');
        } else {
          box.ondragover = (e) => { e.preventDefault(); box.classList.add('active-target'); };
          box.ondragleave = (e) => { box.classList.remove('active-target'); };
          box.ondrop = (e) => {
            e.preventDefault();
            box.classList.remove('active-target');
            let droppedLetter = e.dataTransfer.getData("letter");
            checkMysteryPlacement(droppedLetter, i);
          };

          box.onclick = () => {
            if (currentlySelectedLetter) {
              checkMysteryPlacement(currentlySelectedLetter, i);
              currentlySelectedLetter = null;
              clearKeyboardSelection();
            }
          };
        }
        container.appendChild(box);
      }
      document.getElementById('livesDisplay').innerText = "❤️".repeat(lives) + "🖤".repeat(2-lives);
    }

    function checkMysteryPlacement(letter, index) {
      if (mysteryFilled[index]) return; 

      let feedback = document.getElementById('mFeedback');

      if (correctWord[index] === letter) {
        mysteryFilled[index] = true;
        updateMysteryDropZones();
        
        if (mysteryFilled.every(val => val === true)) {
          feedback.innerText = "🎉 PERFECT! 🎉";
          feedback.style.color = "green";
          window.speechSynthesis.speak(new SpeechSynthesisUtterance("Great!"));
          disableKeyboard('mKeyboardArea');
          setTimeout(() => { currentWordIndex++; loadMysteryWord(); }, 1500);
        } else {
          feedback.innerText = "Good placement!";
          feedback.style.color = "green";
        }
      } else {
        lives--;
        playBuzzer(); 
        feedback.innerText = "Wrong spot!";
        feedback.style.color = "red";
        updateMysteryDropZones();

        if (lives <= 0) {
          feedback.innerText = "Out of tries! We'll try this one again later.";
          handleMissedWord(true); 
          disableKeyboard('mKeyboardArea');
          setTimeout(() => { currentWordIndex++; loadMysteryWord(); }, 2500);
        } else {
          setTimeout(() => { if(feedback.innerText==="Wrong spot!") feedback.innerText = ""; }, 1500);
        }
      }
    }

    // ==========================================
    // GAME 2: SPEED SCRAMBLE
    // ==========================================
    let scrambleGuess = "";
    let scrambleTimerInterval;

    function loadScrambleWord() {
      if (currentWordIndex >= currentWords.length) return endGame();
      
      correctWord = currentWords[currentWordIndex].word.toLowerCase();
      correctSentence = currentWords[currentWordIndex].sentence;
      scrambleGuess = "";
      updateProgressUI();
      document.getElementById('sFeedback').innerText = "";
      document.getElementById('scrambleGuessDisplay').innerText = "";

      let letters = correctWord.split("");
      for (let i = letters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [letters[i], letters[j]] = [letters[j], letters[i]];
      }
      document.getElementById('scrambledPrompt').innerText = letters.join(" ").toUpperCase();
      
      buildBasicKeyboard('sKeyboardArea', (letter) => {
        if(scrambleGuess.length < correctWord.length) {
          scrambleGuess += letter;
          document.getElementById('scrambleGuessDisplay').innerText = scrambleGuess.toUpperCase();
        }
      });

      startScrambleTimer();
    }

    function startScrambleTimer() {
      clearInterval(scrambleTimerInterval);
      let timeLeft = 30;
      document.getElementById('sTimerDisplay').innerText = `⏳ ${timeLeft}`;
      
      scrambleTimerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('sTimerDisplay').innerText = `⏳ ${timeLeft}`;
        
        if (timeLeft <= 0) {
          clearInterval(scrambleTimerInterval);
          handleScrambleTimeout();
        }
      }, 1000);
    }

    function handleScrambleTimeout() {
      playBuzzer();
      let feedback = document.getElementById('sFeedback');
      feedback.innerText = "Time's up! Moving to the next word...";
      feedback.style.color = "red";
      disableKeyboard('sKeyboardArea');
      handleMissedWord(false); 
      setTimeout(() => { currentWordIndex++; loadScrambleWord(); }, 2000);
    }

    function checkScramble() {
      if (scrambleGuess.length === 0) return;
      let feedback = document.getElementById('sFeedback');
      clearInterval(scrambleTimerInterval); 

      if (scrambleGuess === correctWord) {
        feedback.innerText = "🎉 AMAZING! 🎉";
        feedback.style.color = "green";
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Awesome!"));
        disableKeyboard('sKeyboardArea');
        setTimeout(() => { currentWordIndex++; loadScrambleWord(); }, 1500);
      } else {
        feedback.innerText = "Not quite! Moving to the next word...";
        feedback.style.color = "red";
        playBuzzer();
        disableKeyboard('sKeyboardArea');
        handleMissedWord(false); 
        setTimeout(() => { currentWordIndex++; loadScrambleWord(); }, 2000);
      }
    }

    // ==========================================
    // GAME 3: THE VOWEL VOID 
    // ==========================================
    let vowelGuess = "";
    const vowels = ['a','e','i','o','u'];

    function loadVowelWord() {
      if (currentWordIndex >= currentWords.length) return endGame();
      
      correctWord = currentWords[currentWordIndex].word.toLowerCase();
      correctSentence = currentWords[currentWordIndex].sentence;
      vowelGuess = "";
      updateProgressUI();
      document.getElementById('vFeedback').innerText = "";
      
      buildBasicKeyboard('vKeyboardArea', (letter) => {
        if(vowelGuess.length < correctWord.length) {
          vowelGuess += letter;
          updateVowelDisplay();
        }
      });
      updateVowelDisplay();
    }

    function updateVowelDisplay() {
      let display = "";
      
      for (let i = 0; i < correctWord.length; i++) {
        let char = correctWord[i];
        if (!vowels.includes(char)) {
          display += char.toUpperCase() + " ";
          if (vowelGuess.length === i) vowelGuess += char; 
        } else {
          if (i < vowelGuess.length) {
            display += vowelGuess[i].toUpperCase() + " ";
          } else {
            display += "_ ";
          }
        }
      }
      document.getElementById('vowelWordDisplay').innerText = display.trim();
    }

    function checkVowels() {
      let feedback = document.getElementById('vFeedback');
      if (vowelGuess === correctWord) {
        feedback.innerText = "🎉 BRILLIANT! 🎉";
        feedback.style.color = "green";
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Brilliant!"));
        setTimeout(() => { currentWordIndex++; loadVowelWord(); }, 1500);
      } else {
        feedback.innerText = "Check your vowels! Try again.";
        feedback.style.color = "red";
        playBuzzer(); 
        
        if (!missedWords.has(correctWord)) { missedWords.add(correctWord); }
        
        vowelGuess = ""; 
        updateVowelDisplay(); 
      }
    }

    // ==========================================
    // SHARED UTILITIES
    // ==========================================
    function handleBackspace(game) {
      if (game === 'learn' && learnGuess.length > 0) {
        learnGuess = learnGuess.slice(0, -1);
        document.getElementById('learnGuessDisplay').innerText = learnGuess.toUpperCase();
      } else if (game === 'scramble' && scrambleGuess.length > 0) {
        scrambleGuess = scrambleGuess.slice(0, -1);
        document.getElementById('scrambleGuessDisplay').innerText = scrambleGuess.toUpperCase();
      } else if (game === 'vowels' && vowelGuess.length > 0) {
        while (vowelGuess.length > 0 && !vowels.includes(correctWord[vowelGuess.length - 1])) {
            vowelGuess = vowelGuess.slice(0, -1);
        }
        vowelGuess = vowelGuess.slice(0, -1);
        updateVowelDisplay();
      }
    }

    function endGame() {
      document.getElementById('gameMatch').classList.add('hidden');
      document.getElementById('gameLearn').classList.add('hidden');
      document.getElementById('gameMystery').classList.add('hidden');
      document.getElementById('gameScramble').classList.add('hidden');
      document.getElementById('gameVowels').classList.add('hidden');
      document.getElementById('practiceReport').classList.remove('hidden');

      let baseTotal = isVocabMode ? vocabList.length : originalWordList.length;
      let scoreNum = Math.round(((baseTotal - missedWords.size) / baseTotal) * 100);
      
      let passed = scoreNum >= 70;
      let passFail = passed ? "PASS! 🎉" : "Keep Practicing! 💪";
      let passColor = passed ? "#4caf50" : "#e65100";

      document.getElementById('scorePercentDisplay').innerText = scoreNum;
      document.getElementById('passFailDisplay').innerText = passFail;
      document.getElementById('passFailDisplay').style.color = passColor;

      let missedText = missedWords.size > 0 ? Array.from(missedWords).join(", ") : "None! A perfect score! 🌟";
      document.getElementById("missedWordsList").innerText = missedText;

      const quoteEl = document.getElementById('motivationalQuote');
      if (passed) {
        quoteEl.classList.add('hidden');
        try { document.getElementById("yaySound").play(); } catch(e) {}
        confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 } });
      } else {
        const quotes = [
          "Mistakes are proof that you are trying! 💡",
          "Don't give up, you're getting smarter every day! 🧠",
          "Keep practicing, you'll nail it next time! 🔨",
          "Every expert was once a beginner! 🌱"
        ];
        quoteEl.innerText = quotes[Math.floor(Math.random() * quotes.length)];
        quoteEl.classList.remove('hidden');
      }

      // ==========================================
      // GOOGLE CHAT WEBHOOK
      // ==========================================
      const chatWebhookURL = "https://chat.googleapis.com/v1/spaces/AAQA6stRJYk/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=yyJ41A-YpTSrgJ0CWfjrMgTx8Gk7d-b182nXvClbsd8"; 
      
      const chatMessage = missedWords.size > 0 
        ? `🎯 *Spelling Test Complete!*\nGame: ${currentGameType}\nScore: ${scoreNum}%\nWords to practice:\n${missedText}`
        : `🌟 *Spelling Test Complete!*\nGame: ${currentGameType}\nScore: 100%\nPerfect score! No words missed.`;

      fetch(chatWebhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=UTF-8" },
        body: JSON.stringify({ text: chatMessage })
      }).catch(error => console.log("Webhook error", error));
    }
  </script>
